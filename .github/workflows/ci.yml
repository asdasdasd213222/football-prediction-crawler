name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: crawler_owner
          POSTGRES_PASSWORD: ci_owner_only
          POSTGRES_DB: crawler
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crawler_owner -d crawler"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://crawler_owner:ci_owner_only@127.0.0.1:5432/crawler
      TEST_DATABASE_URL: postgresql+psycopg://crawler_owner:ci_owner_only@127.0.0.1:5432/crawler
      TEST_APPLICATION_DATABASE_URL: postgresql+psycopg://crawler_app:ci_app_only@127.0.0.1:5432/crawler
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev,browser]"
      - run: python -m pip install pip-audit
      - name: Create least-privilege CI application role
        run: |
          python - <<'PY'
          from psycopg import connect

          owner_url = "postgresql://crawler_owner:ci_owner_only@127.0.0.1:5432/crawler"
          with connect(owner_url, autocommit=True) as connection:
              connection.execute(
                  "CREATE ROLE crawler_app LOGIN NOSUPERUSER NOCREATEDB "
                  "NOCREATEROLE NOINHERIT NOREPLICATION PASSWORD 'ci_app_only'"
              )
              connection.execute("REVOKE ALL ON DATABASE crawler FROM PUBLIC")
              connection.execute("GRANT CONNECT ON DATABASE crawler TO crawler_app")
              connection.execute("REVOKE CREATE ON SCHEMA public FROM PUBLIC")
              connection.execute("GRANT USAGE ON SCHEMA public TO crawler_app")
              connection.execute(
                  "ALTER DEFAULT PRIVILEGES FOR ROLE crawler_owner IN SCHEMA public "
                  "GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO crawler_app"
              )
              connection.execute(
                  "ALTER DEFAULT PRIVILEGES FOR ROLE crawler_owner IN SCHEMA public "
                  "GRANT USAGE, SELECT ON SEQUENCES TO crawler_app"
              )
          PY
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src
      - run: alembic upgrade head
      - run: alembic downgrade -1
      - run: alembic upgrade head
      - run: pytest -q
      - run: docker compose config
      - run: docker build --tag multisite-crawler:ci .
      - name: Scan built image for critical vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: multisite-crawler:ci
          scan-type: image
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - run: pip-audit
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
