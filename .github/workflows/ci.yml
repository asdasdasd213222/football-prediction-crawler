name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: crawler
          POSTGRES_PASSWORD: ci_local_only
          POSTGRES_DB: crawler
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crawler -d crawler"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://crawler:ci_local_only@127.0.0.1:5432/crawler
      TEST_DATABASE_URL: postgresql+psycopg://crawler:ci_local_only@127.0.0.1:5432/crawler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev,browser]"
      - run: python -m pip install pip-audit
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src
      - run: alembic upgrade head
      - run: alembic downgrade -1
      - run: alembic upgrade head
      - run: pytest -q
      - run: docker compose config
      - run: docker build --tag multisite-crawler:ci .
      - run: pip-audit
      - uses: gitleaks/gitleaks-action@v2
